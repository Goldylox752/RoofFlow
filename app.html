<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SancheAI · Roofing Sales Bot</title>

<style>
:root{
  --bg:#050816;
  --panel:#0b1224;
  --border:rgba(255,255,255,0.08);
  --blue:#4f8cff;
  --text:#edf2ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:14px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:15px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(79,140,255,0.15);
  color:var(--blue);
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  line-height:1.4;
  white-space:pre-wrap;
}

.user{
  background:var(--blue);
  align-self:flex-end;
}

.ai{
  background:var(--panel);
  border:1px solid var(--border);
  align-self:flex-start;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:10px;
  padding:12px;
  background:var(--panel);
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  background:var(--blue);
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>SancheAI · Roofing Sales Bot</h1>
  <div class="badge">Groq AI · Demo Setter</div>
</header>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input id="input" placeholder="Ask about roofing leads, automation, CRM..." />
  <button onclick="send()">Send</button>
</div>

<script>

/* =========================
   BACKEND
========================= */
const API_URL = "https://sanchesolutions.onrender.com/chat";

/* =========================
   SYSTEM PROMPT (YOUR CORE BRAIN)
========================= */
const SYSTEM_PROMPT = `
You are SancheAI, a roofing SaaS sales assistant.

Goal: convert users into booked demos.

Focus on:
- storm leads
- job automation
- CRM value

Keep answers short and persuasive.
Always guide users toward booking a demo or seeing value fast.
Never be overly technical unless asked.
`;

/* =========================
   USER ID
========================= */
const user_id =
  localStorage.getItem("user_id") ||
  crypto.randomUUID();

localStorage.setItem("user_id", user_id);

/* =========================
   UI
========================= */
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   SEND MESSAGE
========================= */
async function send(){

  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  const load = document.createElement("div");
  load.className = "msg ai";
  load.textContent = "Thinking...";
  chat.appendChild(load);
  chat.scrollTop = chat.scrollHeight;

  try{

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text,
        user_id: user_id,
        system: SYSTEM_PROMPT
      })
    });

    const data = await res.json();

    load.textContent =
      data.reply || "No response from AI.";

  }catch(err){
    console.error(err);
    load.textContent = "⚠️ AI backend offline or error.";
  }
}

/* ENTER KEY SUPPORT */
input.addEventListener("keypress",(e)=>{
  if(e.key === "Enter") send();
});

/* INIT MESSAGE */
window.onload = () => {
  addMsg("👋 I’m SancheAI.\nI help roofing companies generate more storm leads and automate jobs.\nAsk me anything or request a demo setup.", "ai");
};

</script>

</body>
</html>
